spring:
  application:
    name: MultimediaWebApp

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

file:
  upload-dir: uploads

groqa:
  api:
    key: ${GROQ_CHAT_API_KEY}
    url: https://api.groq.com/openai/v1/chat/completions

groq:
  api:
    key: ${GROQ_AUDIO_API_KEY}
    url: https://api.groq.com/openai/v1/audio/transcriptions

  model: whisper-large-v3

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000